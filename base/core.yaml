###############################################################################
# Waveshare ESP32-S3-AUDIO-Board - Home Assistant voice assistant (core)
#
# Always-on core: ES8311 DAC + speaker, ES7210 dual-mic ADC, on-device wake word
# (micro_wake_word), the full HA Assist pipeline, a media player that mixes music
# with announcements, the 7x WS2812 status ring, the three onboard buttons (via
# the TCA9555 expander) and voice timers + an alarm clock.
#
# AUDIO LAYOUT
# The DAC and ADC share BCLK/LRCLK pins. Two I2S buses (two ports) ride the
# shared pins: the mic bus is I2S master (always capturing, so it drives a
# continuous clock) and the speaker bus is a slave that reads it. The ES8311
# (DAC) and ES7210 (ADC) are stock and slave to the mic's clock. Capture and
# playback run at once, on stock ESPHome, with no patched es8311 / force_master.
# The full story is in the audio section below. Pinout: docs/HARDWARE.md.
###############################################################################

substitutions:
  name: waveshare-va
  friendly_name: "Waveshare Voice"

  # ---------------------------------------------------------------------------
  # Voice assistant phases - drive the LED ring state machine (see control_leds)
  # ---------------------------------------------------------------------------
  voice_assist_idle_phase_id: '1'                 # ready, waiting for a wake word
  voice_assist_waiting_for_command_phase_id: '2'  # woken, waiting for speech
  voice_assist_listening_for_command_phase_id: '3'# speech detected, recording
  voice_assist_thinking_phase_id: '4'             # STT/LLM running
  voice_assist_replying_phase_id: '5'             # TTS playing
  voice_assist_not_ready_phase_id: '10'           # no HA connection
  voice_assist_error_phase_id: '11'               # pipeline error

  # ---------------------------------------------------------------------------
  # Pins - Waveshare ESP32-S3-AUDIO-Board (see docs/HARDWARE.md). Do not change
  # unless you are on a different board.
  # ---------------------------------------------------------------------------
  i2s_mclk: GPIO12
  i2s_bclk: GPIO13          # SCLK
  i2s_lrclk: GPIO14         # LRCK/WS
  i2s_din: GPIO15           # ES7210 -> ESP (mic in)
  i2s_dout: GPIO16          # ESP -> ES8311 (speaker out)
  i2c_sda: GPIO11
  i2c_scl: GPIO10
  led_pin: GPIO38
  led_num: '7'              # WS2812 ring
  # TCA9555 expander channels. Confirmed against Waveshare's own driver code
  # (Audio_ES8311.cpp drives EXIO8; Button_Driver.cpp reads EXIO9/10/11), which
  # is why the "schematic says the keys are on 12" folklore is ignored here.
  amp_ctrl: '8'             # PA_EN / amplifier enable - ACTIVE HIGH
  key1_exio: '9'            # volume down  (active low, 10k hardware pull-up)
  key2_exio: '10'           # play/pause
  key3_exio: '11'           # volume up

  # ---------------------------------------------------------------------------
  # Home Assistant / network
  # ---------------------------------------------------------------------------
  hidden_ssid: 'false'      # true = fast_connect, required for a hidden SSID

  # Media player volume clamps (the onboard amp distorts near the top).
  volume_min: '0.4'
  volume_max: '0.8'

  # Clock timezone in POSIX form - the device has no IANA database. It is only
  # a fallback: HA's time platform syncs the clock, and the `set_time_zone` API
  # action overwrites this at runtime (persisted). Grab yours from
  # https://github.com/nayarsystems/posix_tz_db/blob/master/zones.csv
  posix_timezone: "UTC0"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.8.0
  on_boot:
    # Publish a "no timer" placeholder and paint the ring as early as we can, so
    # the device shows life while Wi-Fi/API are still coming up.
    - priority: 375
      then:
        - sensor.template.publish:
            id: next_timer
            state: -1
        - script.execute: control_leds
        # Safety net: if HA never connects, stop showing the boot animation.
        - delay: 10min
        - if:
            condition:
              lambda: return id(init_in_progress);
            then:
              - lambda: id(init_in_progress) = false;
              - script.execute: control_leds
    - priority: -100
      then:
        # Restore the alarm settings and the timezone saved in flash.
        - lambda: |-
            id(alarm_time).publish_state(id(saved_alarm_time));
        - lambda: |-
            auto call = id(alarm_action).make_call();
            call.set_option(id(saved_alarm_action));
            call.perform();
        - lambda: |-
            setenv("TZ", id(saved_time_zone).c_str(), 1);
            tzset();
        # Diagnostics: an explicit OFF switch that silences the mic completely.
        # ON = microphone disabled. (This used to be inverted, so the mic was
        # stopped on every boot with the switch in its default OFF position.)
        - if:
            condition:
              switch.is_on: diag_disable_mic
            then:
              - logger.log: "Mic DISABLED for diagnostics"
              - micro_wake_word.stop:
              - voice_assistant.stop:
              - microphone.stop_capture: i2s_mics
            else:
              - logger.log: "Mic enabled"

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

      # Considerably speeds up micro_wake_word at the cost of more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  id: wifi_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: ${hidden_ssid}
  power_save_mode: none     # audio streaming hates Wi-Fi power saving
  reboot_timeout: 10min
  on_connect:
    - lambda: id(improv_ble_in_progress) = false;
    - script.execute: control_leds
  on_disconnect:
    - script.execute: control_leds

logger:
  level: DEBUG

api:
  id: api_id
  # No encryption: this is a LAN-only device on a trusted network, same as the
  # sibling Guition project. To lock it down, add:
  #   encryption:
  #     key: !secret api_encryption_key
  # and put the base64 key in your dashboard's secrets.
  actions:
    - action: start_va
      then:
        - voice_assistant.start
    - action: stop_va
      then:
        - voice_assistant.stop
    - action: set_alarm_time
      variables:
        alarm_time_hh_mm: string
      then:
        - lambda: |-
            if (alarm_time_hh_mm.length() == 5 &&
              isdigit(alarm_time_hh_mm[0]) && isdigit(alarm_time_hh_mm[1]) &&
              isdigit(alarm_time_hh_mm[3]) && isdigit(alarm_time_hh_mm[4])) {
                id(alarm_time).publish_state(alarm_time_hh_mm);
                id(saved_alarm_time) = alarm_time_hh_mm;
              }
    - action: set_time_zone
      variables:
        posix_time_zone: string
      then:
        - lambda: |-
            setenv("TZ", posix_time_zone.c_str(), 1);
            tzset();
            id(saved_time_zone) = posix_time_zone;
            id(publish_current_time).execute();
  on_client_connected:
    - script.execute: control_leds
  on_client_disconnected:
    - script.execute: control_leds

ota:
  - platform: esphome
    id: ota_esphome

i2c:
  - id: internal_i2c
    sda: ${i2c_sda}
    scl: ${i2c_scl}
    scan: true
    frequency: 100kHz

# I/O expander: amplifier enable + the three front buttons.
tca9555:
  id: ioexp
  i2c_id: internal_i2c
  address: 0x20

time:
  - platform: homeassistant
    id: rtc
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - script.execute: check_alarm
    on_time_sync:
      - script.execute: publish_current_time

# The DAC and ADC share BCLK/LRCLK pins, but ESPHome's i2s_audio cannot run one
# bus full-duplex (the mic and speaker each call i2s_new_channel on the port, and
# the second fails with "Parent bus is busy"). So we use TWO buses (two I2S ports)
# over the shared pins:
#   - i2s_input  = the MIC bus, I2S MASTER. The mic is always capturing (wake
#     word), so it drives BCLK/LRCLK/MCLK continuously. Using the ESP as master
#     is what makes the mic get a correct-rate stream (a codec-mastered clock via
#     force_master gave the mic garbage and killed wake word).
#   - i2s_output = the SPEAKER bus, I2S SLAVE. It reads the mic's clock and only
#     needs to output data, so it never contends for a port of its own.
# The ES8311 (DAC) and ES7210 (ADC) are stock and slave to the mic's clock; no
# patched es8311 / force_master is needed.
i2s_audio:
  - id: i2s_input
    i2s_mclk_pin: ${i2s_mclk}
    i2s_bclk_pin:
      number: ${i2s_bclk}
      allow_other_uses: true
    i2s_lrclk_pin:
      number: ${i2s_lrclk}
      allow_other_uses: true
  - id: i2s_output
    i2s_bclk_pin:
      number: ${i2s_bclk}
      allow_other_uses: true
    i2s_lrclk_pin:
      number: ${i2s_lrclk}
      allow_other_uses: true

audio_adc:
  - platform: es7210
    id: adc_mic
    i2c_id: internal_i2c
    # Runtime gain lives on the `mic_gain_db` number below. The ES7210 caps at
    # 37.5 dB; higher values are silently clamped by the driver.
    mic_gain: 24db

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: internal_i2c

microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_audio_id: i2s_input
    i2s_din_pin: ${i2s_din}
    adc_type: external
    pdm: false
    # default i2s_mode: primary -> this bus masters the shared clock.
    # 16-bit on purpose: as master the mic defines the frame's slot width, and
    # the i2s_audio default is 32-bit. The ES8311/speaker are 16-bit, so a
    # 32-bit frame doubles the bit clock they expect and playback comes out as
    # noise. Matching 16-bit aligns the whole bus (the ES7210 is 16-bit too).
    bits_per_sample: 16bit

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    i2s_audio_id: i2s_output
    i2s_dout_pin: ${i2s_dout}
    i2s_mode: secondary          # slave to the mic bus's clock
    dac_type: external
    audio_dac: es8311_dac
    timeout: never
    buffer_duration: 100ms

  # Mixes the announcement and media pipelines into the one physical output.
  # Mono: the board has a single speaker (mono ES8311 + NS4150B), so a second
  # channel would just be discarded.
  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_audio_speaker
    num_channels: 1
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  # The mixer needs both inputs at one sample rate; these resample if needed.
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input

media_player:
  - platform: speaker
    id: external_media_player
    name: None
    internal: False
    volume_increment: 0.01
    volume_min: ${volume_min}
    volume_max: ${volume_max}
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC              # cheapest codec for the S3
      num_channels: 1           # stereo is pointless for announcements
      sample_rate: 48000        # what Music Assistant serves
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC
      num_channels: 1           # mono hardware, one speaker
      sample_rate: 48000
    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
    on_state:
      # Amp follows playback: turn it on the instant audio starts. It stays on
      # afterwards (the speaker then holds the line at clean silence), so there
      # is no per-sound clicking - only the boot window is silent.
      - if:
          condition:
            or:
              - media_player.is_announcing:
              - lambda: 'return id(external_media_player)->state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING;'
          then:
            - switch.turn_on: amp_enable
      - if:
          condition:
            and:
              - switch.is_off: timer_ringing
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_announcing:
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixing_input
                decibel_reduction: 0
                duration: 1.0s
    on_mute:
      - delay: 100ms            # debounce
      - script.execute: control_leds_volume_changed
    on_unmute:
      - delay: 100ms
      - script.execute: control_leds_volume_changed
    on_volume:
      if:
        condition:
          - lambda: return !id(init_in_progress);
        then:
          - delay: 100ms
          - script.execute: control_leds_volume_changed
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
      - id: wake_word_triggered_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
      - id: error_cloud_expired
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/error_cloud_expired.mp3

micro_wake_word:
  id: mww
  microphone: i2s_mics
  stop_after_detection: false
  models:
    - model: https://github.com/esphome/micro-wake-word-models/raw/main/models/v2/alexa.json
      id: alexa
    - model: https://github.com/esphome/micro-wake-word-models/raw/main/models/v2/okay_nabu.json
      id: okay_nabu
  vad:
    model: https://github.com/esphome/micro-wake-word-models/raw/main/models/v2/vad.json
  on_wake_word_detected:
    # Muted (software mute switch)? Do nothing at all.
    - if:
        condition:
          switch.is_off: mic_mute_switch
        then:
          # A timer is ringing -> the wake word just silences it.
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                # Already listening -> the wake word cancels the session.
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      voice_assistant.stop:
                    else:
                      # Announcing -> the wake word stops the announcement.
                      - if:
                          condition:
                            media_player.is_announcing:
                          then:
                            - media_player.stop:
                                announcement: true
                          # Otherwise: beep, then start Assist.
                          else:
                            - if:
                                condition:
                                  switch.is_on: wake_sound
                                then:
                                  - script.execute:
                                      id: play_sound
                                      priority: true
                                      sound_file: !lambda return id(wake_word_triggered_sound);
                                  - delay: 300ms
                            - voice_assistant.start:
                                wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: i2s_mics
  media_player: external_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 0
  auto_gain: 0 dbfs
  volume_multiplier: 1
  on_client_connected:
    - if:
        condition:
          - lambda: return id(init_in_progress);
          - switch.is_on: mic_mute_switch
        then:
          - switch.turn_off: mic_mute_switch
    - lambda: id(init_in_progress) = false;
    # Respect the diagnostics switch - it used to be overridden here on every
    # HA (re)connect.
    - if:
        condition:
          switch.is_off: diag_disable_mic
        then:
          - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
    # One-shot "ready" chime. It MUST run after micro_wake_word.start above: the
    # speaker is a slave to the mic's I2S clock, so playing before the mic is
    # capturing hangs the announcement (and then wake word stops working). The
    # flag is set first so an HA reconnect can't replay it.
    - if:
        condition:
          - lambda: 'return !id(boot_chime_done);'
          - switch.is_on: boot_sound
          - switch.is_off: diag_disable_mic
        then:
          - lambda: id(boot_chime_done) = true;
          - delay: 1s            # let the mic-master clock settle
          - script.execute:
              id: play_sound
              priority: true
              sound_file: !lambda return id(wake_word_triggered_sound);
  on_client_disconnected:
    - voice_assistant.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: control_leds
  on_error:
    # duplicate_wake_up_detected and stt-no-text-recognized are normal; showing
    # a red error ring for them just looks broken.
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_leds
    - if:
        condition:
          - lambda: return code == "cloud-auth-failed";
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: !lambda return id(error_cloud_expired);
  on_start:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 30    # duck music hard while listening
        duration: 0.0s
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_leds
  on_intent_progress:
    - if:
        condition:
          # A non-empty x means a streaming TTS url reached the media player.
          lambda: 'return !x.empty();'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
  on_tts_start:
    - if:
        condition:
          lambda: 'return id(voice_assistant_phase) != ${voice_assist_replying_phase_id};'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
  on_tts_end:
    - script.execute:
        id: send_tts_uri_event
        tts_uri: !lambda 'return x;'
  on_stt_end:
    - script.execute:
        id: send_stt_text_event
        stt_text: !lambda 'return x;'
  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s            # let the error colour linger a beat
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - lambda: |
        id(next_timer).publish_state(-1);
        id(next_timer_name).publish_state("-");
  on_timer_started:
    - lambda: |
        id(check_if_timers_active).execute();
        if (id(is_timer_active)) {
          id(fetch_first_active_timer).execute();
          id(next_timer).publish_state(id(first_active_timer).seconds_left);
          id(next_timer_name).publish_state(id(first_active_timer).name);
        }
    - script.execute: control_leds
  on_timer_cancelled:
    - lambda: |
        id(check_if_timers_active).execute();
        if (id(is_timer_active)) {
          id(fetch_first_active_timer).execute();
          id(next_timer).publish_state(id(first_active_timer).seconds_left);
          id(next_timer_name).publish_state(id(first_active_timer).name);
        } else {
          id(next_timer).publish_state(-1);
          id(next_timer_name).publish_state("-");
        }
    - script.execute: control_leds
  on_timer_updated:
    - lambda: |
        id(check_if_timers_active).execute();
        if (id(is_timer_active)) {
          id(fetch_first_active_timer).execute();
          id(next_timer).publish_state(id(first_active_timer).seconds_left);
          id(next_timer_name).publish_state(id(first_active_timer).name);
        }
    - script.execute: control_leds
  on_timer_tick:
    - lambda: |
        id(fetch_first_active_timer).execute();
        int seconds_left = id(first_active_timer).seconds_left;
        if (seconds_left % 5 == 0) {
          id(next_timer).publish_state(seconds_left);
        }
        // The ring is repainted centrally by control_leds().

light:
  - platform: esp32_rmt_led_strip
    id: status_ring
    name: "Status Ring"
    pin: ${led_pin}
    num_leds: ${led_num}
    chipset: WS2812
    rgb_order: RGB
    default_transition_length: 150ms
    effects:
      # update_interval must be LONGER than transition_length: it is how often
      # the pulse flips its brightness target (min<->max), not a frame rate. A
      # 16ms interval flips faster than the transition can move, so the ring just
      # sits at one brightness (looks solid). ~2x the transition pulses cleanly.
      - pulse:
          name: "Pulse Slow"
          min_brightness: 30%
          max_brightness: 100%
          transition_length: 2000ms
          update_interval: 3000ms
      - pulse:
          name: "Pulse Medium"
          min_brightness: 30%
          max_brightness: 100%
          transition_length: 600ms
          update_interval: 1200ms
      - pulse:
          name: "Pulse Fast"
          min_brightness: 30%
          max_brightness: 100%
          transition_length: 300ms
          update_interval: 600ms
      - addressable_rainbow:
          name: "Rainbow Slow"
          speed: 6
          width: 7
      - addressable_color_wipe:
          name: "Wipe"
      # Scan / Twinkle use the phase colour set by control_leds, so they still
      # read as "listening/thinking/replying" while looking different.
      - addressable_scan:
          name: "Scan"
          move_interval: 120ms
          scan_width: 2
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 8%
          progress_interval: 40ms
      - addressable_fireworks:
          name: "Fireworks"
          spark_probability: 12%
          use_random_color: true
      - addressable_random_twinkle:
          name: "Random Twinkle"
          twinkle_probability: 8%
          progress_interval: 40ms
      - addressable_rainbow:
          name: "Rainbow Fast"
          speed: 15
          width: 7
      # Custom effects. current_color is the phase colour set by control_leds,
      # so these still read as the current assistant state.
      - addressable_lambda:
          name: "Comet"
          update_interval: 70ms
          lambda: |-
            static int head = 0;
            const int n = it.size();
            for (int i = 0; i < n; i++) {
              int d = (head - i + n) % n;                 // 0 at head, grows behind
              float b = (d < 5) ? (1.0f / (1 << d)) : 0.0f;
              it[i] = Color((uint8_t)(current_color.red   * b),
                            (uint8_t)(current_color.green * b),
                            (uint8_t)(current_color.blue  * b));
            }
            head = (head + 1) % n;
      - addressable_lambda:
          name: "Breathe"
          update_interval: 32ms
          lambda: |-
            static uint16_t t = 0;
            float b = (sinf(t * 3.14159265f / 128.0f) + 1.0f) * 0.5f;  // 0..1
            b = 0.12f + b * 0.88f;                                     // floor 12%
            it.all() = Color((uint8_t)(current_color.red   * b),
                             (uint8_t)(current_color.green * b),
                             (uint8_t)(current_color.blue  * b));
            t = (t + 2) % 256;
      - addressable_lambda:
          name: "Spinner"
          update_interval: 90ms
          lambda: |-
            static int pos = 0;
            const int n = it.size();
            it.all() = Color(0, 0, 0);
            it[pos % n] = current_color;
            it[(pos + 1) % n] = Color((uint8_t)(current_color.red   * 0.35f),
                                      (uint8_t)(current_color.green * 0.35f),
                                      (uint8_t)(current_color.blue  * 0.35f));
            pos = (pos + 1) % n;
      - addressable_lambda:
          name: "Fire"
          update_interval: 70ms
          lambda: |-
            const int n = it.size();
            for (int i = 0; i < n; i++) {
              uint8_t r = 160 + (esp_random() % 96);       // 160..255
              uint8_t g = (uint8_t)(r * (0.20f + (esp_random() % 45) / 255.0f));
              it[i] = Color(r, g, 0);
            }

globals:
  - id: mic_is_muted
    type: bool
    restore_value: no          # the switch forces OFF at boot (see on_client_connected)
    initial_value: 'false'
  # Transient pass-through for the current ring colour (set by led_set_effect
  # from its params right before use), so no need to persist across reboots.
  - id: led_ring_color_r
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: led_ring_color_g
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: led_ring_color_b
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: improv_ble_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: boot_chime_done
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: saved_alarm_time
    type: std::string
    restore_value: yes
    initial_value: '"Unknown"'
  - id: saved_time_zone
    type: std::string
    restore_value: yes
    initial_value: '"${posix_timezone}"'
  - id: saved_alarm_action
    type: std::string
    restore_value: yes
    initial_value: '"Play sound"'
  - id: first_active_timer
    type: voice_assistant::Timer
    restore_value: no
  - id: is_timer_active
    type: bool
    restore_value: no

script:
  - id: flash_ring
    then:
      - light.turn_on: { id: status_ring, red: 1.0, green: 0.0, blue: 0.0, brightness: 100%, effect: "None" }
      - delay: 250ms
      # Return to the real state instead of going dark (e.g. if a timer is
      # counting or the VA is active while the mic is muted/unmuted).
      - script.execute: control_leds

  # Minimal LED dispatcher: off / solid / a named built-in effect.
  - id: led_set_effect
    mode: restart
    parameters:
      effect: std::string
      r: float
      g: float
      b: float
    then:
      - lambda: |-
          id(led_ring_color_r) = r;
          id(led_ring_color_g) = g;
          id(led_ring_color_b) = b;
          ESP_LOGI("led", "led_set_effect: effect='%s' rgb(%.2f, %.2f, %.2f) brightness=%.2f",
                   effect.c_str(), r, g, b, (float) id(led_ring_brightness).state);
      - if:
          condition:
            lambda: 'return effect == "off";'
          then:
            - light.turn_off: status_ring
          else:
            - if:
                condition:
                  lambda: 'return effect == "solid";'
                then:
                  - light.turn_on:
                      id: status_ring
                      effect: "None"    # clear any running effect so solid is steady
                      brightness: !lambda 'return id(led_ring_brightness).state;'
                      red: !lambda 'return id(led_ring_color_r);'
                      green: !lambda 'return id(led_ring_color_g);'
                      blue: !lambda 'return id(led_ring_color_b);'
                else:
                  - light.turn_on:
                      id: status_ring
                      brightness: !lambda 'return id(led_ring_brightness).state;'
                      red: !lambda 'return id(led_ring_color_r);'
                      green: !lambda 'return id(led_ring_color_g);'
                      blue: !lambda 'return id(led_ring_color_b);'
                      effect: !lambda 'return effect;'

  # The single LED state machine. Everything that changes device state calls
  # this; nothing else paints the ring directly.
  - id: control_leds
    mode: single
    then:
      - lambda: |-
          const bool wifi_connected = id(wifi_id).is_connected();
          const bool api_connected  = id(api_id).is_connected();
          const bool ringing        = id(timer_ringing).state;
          const bool improv_ble     = id(improv_ble_in_progress);
          const bool init_progress  = id(init_in_progress);
          const int  phase          = id(voice_assistant_phase);

          id(check_if_timers_active).execute();
          const bool timers_active = id(is_timer_active);

          ESP_LOGD("led",
                   "control_leds: wifi=%d api=%d improv=%d init=%d ringing=%d timers_active=%d phase=%d",
                   (int)wifi_connected, (int)api_connected, (int)improv_ble, (int)init_progress,
                   (int)ringing, (int)timers_active, phase);

          auto set = [&](const std::string &effect, float r, float g, float b) {
            id(led_set_effect).execute(effect, r, g, b);
          };

          if (improv_ble) {                          // BLE provisioning
            set("Pulse Medium", 1.0, 0.89, 0.71);    // warm white
            return;
          }
          if (init_progress) {                       // booting
            if (wifi_connected) set("Rainbow Slow", 0.9, 0.1, 0.85);
            else                set("Rainbow Slow", 1.0, 0.1, 0.1);
            return;
          }
          if (!wifi_connected || !api_connected) {   // HA unreachable
            set("Pulse Medium", 1.0, 0.0, 0.0);
            return;
          }
          if (ringing) {                             // timer/alarm ringing
            set("Pulse Fast", 0.6, 0.0, 0.6);
            return;
          }

          switch (phase) {
            case ${voice_assist_waiting_for_command_phase_id}:
              set("solid", 0.5, 0.0, 0.5);           // calm violet: I'm awake
              return;
            case ${voice_assist_listening_for_command_phase_id}:
              set(id(listening_effect).current_option(), 0.8, 0.0, 0.8);
              return;
            case ${voice_assist_thinking_phase_id}:
              set(id(thinking_effect).current_option(), 0.6, 0.0, 0.6);
              return;
            case ${voice_assist_replying_phase_id}:
              set(id(replying_effect).current_option(), 0.6, 0.0, 0.6);
              return;
            case ${voice_assist_error_phase_id}:
              set("Pulse Fast", 1.0, 0.0, 0.0);
              return;
            case ${voice_assist_not_ready_phase_id}:
              set("Pulse Slow", 1.0, 0.0, 0.0);
              return;
            default: break;
          }

          if (timers_active) {                       // a timer is counting down
            set("Pulse Slow", 0.6, 0.0, 0.6);
            return;
          }

          set("off", 0, 0, 0);                       // idle

  # A short green pulse on a volume change, then back to the state machine.
  - id: control_leds_volume_changed
    mode: restart
    then:
      - light.turn_on:
          id: status_ring
          brightness: !lambda 'return id(led_ring_brightness).state;'
          red: 0.0
          green: 1.0
          blue: 0.0
          effect: "Pulse Fast"
      - delay: 1.2s
      - script.execute: control_leds

  - id: ring_timer
    then:
      - script.execute: enable_repeat_one
      - script.execute:
          id: play_sound
          priority: true
          sound_file: !lambda return id(timer_finished_sound);

  - id: enable_repeat_one
    then:
      - lambda: |-
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(external_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 500);

  - id: disable_repeat
    then:
      - lambda: |-
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
              .set_announcement(true)
              .perform();
            id(external_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);

  - id: play_sound
    parameters:
      priority: bool
      sound_file: "audio::AudioFile*"
    then:
      - lambda: |-
          if (priority) {
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
              .set_announcement(true)
              .perform();
          }
          if ((id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING) || priority) {
            id(external_media_player)->play_file(sound_file, true, false);
          }

  - id: fetch_first_active_timer
    mode: single
    then:
      - lambda: |
          static uint32_t last_fetch_time = 0;
          uint32_t now = millis();
          if (now - last_fetch_time < 500) return;
          last_fetch_time = now;

          const auto &timers = id(va).get_timers();
          if (timers.empty()) return;

          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(first_active_timer) = output_timer;

  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          if (!timers.empty()) {
            for (const auto &timer : timers) {
              if (timer.is_active) {
                output = true;
                break;
              }
            }
          }
          id(is_timer_active) = output;

  - id: check_alarm
    then:
      - lambda: |-
          id(publish_current_time).execute();
          if (id(alarm_on).state && id(alarm_time).has_state()) {
            auto set_alarm_time = id(alarm_time).state;
            if (set_alarm_time.length() == 5 &&
                isdigit(set_alarm_time[0]) && isdigit(set_alarm_time[1]) &&
                isdigit(set_alarm_time[3]) && isdigit(set_alarm_time[4])) {
              auto alarm_hour = std::stoi(set_alarm_time.substr(0, 2));
              auto alarm_minute = std::stoi(set_alarm_time.substr(3, 2));

              auto time_now = id(rtc).now();
              if (time_now.hour == alarm_hour && time_now.minute == alarm_minute) {
                std::string action = id(alarm_action).current_option();
                if (action == "Play sound") {
                  id(timer_ringing).turn_on();
                } else if (action == "Send event") {
                  id(send_alarm_event).execute();
                } else if (action == "Sound and event") {
                  id(timer_ringing).turn_on();
                  id(send_alarm_event).execute();
                }
              }
            } else {
              ESP_LOGW("alarm", "Incorrect alarm time setting");
            }
          }

  - id: send_alarm_event
    then:
      - homeassistant.event:
          event: esphome.alarm_ringing

  - id: send_tts_uri_event
    parameters:
      tts_uri: string
    then:
      - homeassistant.event:
          event: esphome.tts_uri
          data:
            uri: !lambda return tts_uri;

  - id: send_stt_text_event
    parameters:
      stt_text: string
    then:
      - homeassistant.event:
          event: esphome.stt_text
          data:
            text: !lambda return stt_text;

  - id: publish_current_time
    mode: single
    then:
      - lambda: |-
          static std::string last_time_string = "";
          auto time_now = id(rtc).now();
          std::string current_time_string = time_now.strftime("%H:%M");
          if (current_time_string != last_time_string) {
            id(current_time).publish_state(current_time_string);
            last_time_string = current_time_string;
          }

select:
  - platform: template
    name: "Wake word sensitivity"
    optimistic: true
    initial_option: Slightly sensitive
    restore_value: true
    entity_category: config
    options:
      - Slightly sensitive
      - Moderately sensitive
      - Very sensitive
    # Probability cutoffs are quantised uint8 (255 = 1.0); the comment on each
    # line is the floating point value. FAPH = false accepts per hour measured
    # against the Dinner Party Corpus. Values apply to the models pinned above.
    on_value:
      - lambda: |-
          if (x == "Slightly sensitive") {
            id(alexa).set_probability_cutoff(230);        // 0.90
            id(okay_nabu).set_probability_cutoff(217);    // 0.85 -> 0.000 FAPH (manifest default)
          } else if (x == "Moderately sensitive") {
            id(alexa).set_probability_cutoff(191);        // 0.75
            id(okay_nabu).set_probability_cutoff(176);    // 0.69 -> 0.376 FAPH
          } else if (x == "Very sensitive") {
            id(alexa).set_probability_cutoff(128);        // 0.50
            id(okay_nabu).set_probability_cutoff(143);    // 0.56 -> 0.751 FAPH
          }

  # Pick the ring animation for each voice-assistant phase, from HA, live.
  # The option strings must match effect names in the light's `effects:` block
  # (plus "solid"). control_leds reads these; the phase colour stays fixed.
  - platform: template
    name: "Listening effect"
    id: listening_effect
    icon: mdi:led-strip-variant
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Pulse Medium"
    options: &va_ring_effects
      - solid
      - Pulse Slow
      - Pulse Medium
      - Pulse Fast
      - Breathe
      - Wipe
      - Scan
      - Spinner
      - Comet
      - Twinkle
      - Random Twinkle
      - Fireworks
      - Fire
      - Rainbow Slow
      - Rainbow Fast
    # This trigger also fires while restore_value replays the saved option during
    # setup() (HARDWARE priority), before the light/RMT and voice_assistant are
    # up. Running control_leds then paints an effect on an uninitialised strip and
    # crashes the boot, so gate it until on_boot (-100) clears init_in_progress.
    on_value: &repaint_if_ready
      - if:
          condition:
            lambda: 'return !id(init_in_progress);'
          then:
            - script.execute: control_leds
  - platform: template
    name: "Thinking effect"
    id: thinking_effect
    icon: mdi:led-strip-variant
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Pulse Slow"
    options: *va_ring_effects
    on_value: *repaint_if_ready
  - platform: template
    name: "Replying effect"
    id: replying_effect
    icon: mdi:led-strip-variant
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Wipe"
    options: *va_ring_effects
    on_value: *repaint_if_ready

  - platform: logger
    id: logger_select
    name: Logger Level
    disabled_by_default: true
  - platform: template
    optimistic: true
    name: "Alarm action"
    id: alarm_action
    icon: mdi:bell-plus
    internal: true              # daily-alarm feature, hidden from HA
    options:
      - "Play sound"
      - "Send event"
      - "Sound and event"
    initial_option: "Play sound"
    on_value:
      then:
        - lambda: |-
            id(saved_alarm_action) = x;

switch:
  - platform: template
    id: diag_disable_mic
    name: "Diag: disable microphone"
    icon: mdi:microphone-settings
    internal: true                      # diagnostic-only, not shown in HA
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF   # OFF = mic works as usual
    # These triggers also fire during setup() when the state is restored from
    # flash - at setup_priority HARDWARE-2, i.e. before the mic and mWW exist.
    # on_boot (priority -100) applies the restored state once everything is up,
    # so here we only handle a live toggle.
    on_turn_on:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - micro_wake_word.stop:
            - voice_assistant.stop:
            - microphone.stop_capture: i2s_mics
    on_turn_off:
      - if:
          condition:
            - lambda: return !id(init_in_progress);
            - switch.is_off: mic_mute_switch
          then:
            - micro_wake_word.start:

  - platform: gpio
    id: amp_enable
    name: Amplifier
    icon: mdi:speaker
    entity_category: config
    pin:
      tca9555: ioexp
      number: ${amp_ctrl}
      inverted: false
    # OFF at boot so the amp doesn't amplify the undriven DAC line as a hiss
    # before the speaker's first playback. The media_player on_state turns it on
    # the moment audio starts and leaves it on (the speaker then holds the line
    # at silence, which is clean).
    restore_mode: ALWAYS_OFF

  - platform: template
    id: mic_mute_switch
    name: "Microphone Mute"
    icon: mdi:microphone-off
    # State comes from the lambda below, so restore_mode would be a no-op here.
    # The mute is forced off at boot by the voice_assistant on_client_connected.
    lambda: |-
      return id(mic_is_muted);
    # A real mute, via ESPHome's own primitive: microphone.mute makes the
    # Microphone hand every consumer a zero-filled buffer, so the wake word
    # literally hears silence. The stream keeps running, so there is no I2S
    # restart and no start/stop race.
    #
    # The previous implementation dropped the ES7210 gain to 0.0f - but 0 dB is
    # UNITY gain, not silence. The mic kept hearing the room and only the wake
    # word handler ignored it.
    turn_on_action:
      - lambda: id(mic_is_muted) = true;
      - microphone.mute: i2s_mics
      - script.execute: flash_ring
    turn_off_action:
      - lambda: id(mic_is_muted) = false;
      - microphone.unmute: i2s_mics
      - script.execute: flash_ring

  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: boot_sound
    name: Boot sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
      - script.execute: ring_timer
      - script.execute: control_leds
      - delay: 15min           # give up if nobody stops it
      - switch.turn_off: timer_ringing
    on_turn_off:
      - script.execute: disable_repeat
      - if:
          condition:
            media_player.is_announcing:
          then:
            media_player.stop:
              announcement: true
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 1.0s
      - script.execute: control_leds

  - platform: template
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    id: alarm_on
    icon: mdi:bell-badge
    name: "Alarm on"
    internal: true              # daily-alarm feature, hidden from HA
    on_turn_on:
      - script.execute: control_leds
    on_turn_off:
      - script.execute: control_leds

number:
  - platform: template
    id: mic_gain_db
    name: "Mic gain (ES7210)"
    icon: mdi:microphone-settings
    entity_category: config
    unit_of_measurement: dB
    min_value: 0
    max_value: 37.5           # ES7210 hardware ceiling - the driver clamps above this
    step: 1.5
    restore_value: true
    initial_value: 24
    mode: slider
    set_action:
      - lambda: |-
          id(adc_mic).set_mic_gain(x);
      - logger.log:
          format: "[MIC] ES7210 gain -> %.1f dB"
          args: ["x"]

  - platform: template
    id: led_ring_brightness
    name: "LED Ring Brightness"
    icon: mdi:brightness-6
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0.4
    max_value: 1.0
    step: 0.05
    initial_value: 0.8
    mode: slider
    on_value:
      - if:
          condition:
            light.is_on: status_ring
          then:
            - light.turn_on:
                id: status_ring
                brightness: !lambda 'return x;'

sensor:
  - platform: template
    id: next_timer
    name: "Next timer"
    update_interval: never
    device_class: duration
    unit_of_measurement: s
    icon: "mdi:timer"
    accuracy_decimals: 0

text_sensor:
  - platform: template
    id: next_timer_name
    name: "Next timer name"
    icon: "mdi:timer"
  - platform: template
    name: "Alarm time"
    id: alarm_time
    icon: mdi:bell-ring
    internal: true              # daily-alarm feature, hidden from HA
  # Published for the alarm/clock logic, but not shown in HA (it's just the
  # device's own clock, which HA already has).
  - platform: template
    id: current_time
    internal: true

button:
  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"
    entity_category: diagnostic
    internal: true
  - platform: restart
    id: restart_button
    name: "Restart"
    entity_category: config
    disabled_by_default: true
    icon: "mdi:restart"

binary_sensor:
  - platform: gpio
    name: "Key1"
    pin:
      tca9555: ioexp
      number: ${key1_exio}
      inverted: true
    on_press:
      - media_player.volume_down: external_media_player

  - platform: gpio
    name: "Key2"
    pin:
      tca9555: ioexp
      number: ${key2_exio}
      inverted: true
    on_press:
      - media_player.toggle: external_media_player

  - platform: gpio
    name: "Key3"
    pin:
      tca9555: ioexp
      number: ${key3_exio}
      inverted: true
    on_press:
      - media_player.volume_up: external_media_player
